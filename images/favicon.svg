<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- New "instrument" brand: dark panel + amber agent-node mark (echoes hero ReAct graph) -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="15" fill="#0B0E14" stroke="#2C3547" stroke-width="1.5"/>

  <!-- amber core glow -->
  <circle cx="32" cy="22" r="12" fill="#E8B84B" opacity="0.14"/>

  <!-- connectors: planner -> input / output, and base -->
  <g stroke-linecap="round" fill="none">
    <path d="M32 22 L20 42" stroke="#2C3547" stroke-width="3"/>
    <path d="M32 22 L44 42" stroke="#2C3547" stroke-width="3"/>
    <path d="M20 42 L44 42" stroke="#2C3547" stroke-width="3"/>
    <!-- self-critique loop back into the core -->
    <path d="M44 42 C 52 34, 46 20, 37 20" stroke="#E8B84B" stroke-width="2.2"
          stroke-dasharray="2.4 3.2" opacity="0.85"/>
  </g>

  <!-- nodes -->
  <circle cx="20" cy="42" r="5" fill="#171C27" stroke="#A3AEC0" stroke-width="2.6"/>
  <circle cx="44" cy="42" r="5" fill="#171C27" stroke="#5FD08B" stroke-width="2.6"/>
  <circle cx="32" cy="22" r="7.5" fill="#E8B84B"/>
  <circle cx="32" cy="22" r="2.6" fill="#0B0E14"/>
</svg>

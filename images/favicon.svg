<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070d1a"/>
      <stop offset="100%" style="stop-color:#0d1c35"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#00e5a0"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#00e5a0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Outer gradient ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.9"/>

  <!-- Inner subtle ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>

  <!-- Neural node dots — top -->
  <circle cx="32" cy="8"  r="2.2" fill="#00d4ff" opacity="0.9"/>
  <!-- Neural node dots — corners -->
  <circle cx="8"  cy="32" r="1.8" fill="#00e5a0" opacity="0.7"/>
  <circle cx="56" cy="32" r="1.8" fill="#00e5a0" opacity="0.7"/>
  <circle cx="14" cy="14" r="1.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="50" cy="14" r="1.5" fill="#a855f7" opacity="0.6"/>
  <circle cx="14" cy="50" r="1.5" fill="#00d4ff" opacity="0.5"/>
  <circle cx="50" cy="50" r="1.5" fill="#00d4ff" opacity="0.5"/>

  <!-- Connector lines -->
  <line x1="32" y1="8"  x2="14" y2="14" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
  <line x1="32" y1="8"  x2="50" y2="14" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
  <line x1="14" y1="14" x2="8"  y2="32" stroke="#00e5a0" stroke-width="0.6" opacity="0.3"/>
  <line x1="50" y1="14" x2="56" y2="32" stroke="#00e5a0" stroke-width="0.6" opacity="0.3"/>
  <line x1="8"  y1="32" x2="14" y2="50" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>
  <line x1="56" y1="32" x2="50" y2="50" stroke="#00d4ff" stroke-width="0.6" opacity="0.25"/>

  <!-- SRN Text -->
  <text
    x="32" y="37"
    font-family="'Chakra Petch', 'Courier New', monospace"
    font-size="15"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="1"
    fill="url(#text-grad)"
  >SRN</text>
</svg>
